name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Linter & Formatter
        run: pnpm run lint

      - name: Run Type Checking (SSR & DI Validations)
        run: pnpm run check

      - name: Test Build (Simulate SSR Deployment)
        run: pnpm run build
        - name: Run Type Checking (SSR & DI Validations)
        run: pnpm run check

      - name: Test Build (Simulate SSR Deployment)
        run: pnpm run build
        env:
          GITHUB_CLIENT_ID: pending
          GITHUB_CLIENT_SECRET: pending
          BASE_URL: pending
          DATABASE_URL: pending
